<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      background: #0a0a0a;
      color: #d4d4d4;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo {
      width: 24px; height: 24px;
      background: #fff; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .title { font-size: 13px; font-weight: 600; color: #fff; }
    .subtitle { font-size: 11px; color: #525252; margin-left: auto; }

    .body { padding: 16px; }

    /* Login view */
    #login-view .label {
      font-size: 11px; color: #737373; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 6px;
    }
    #login-view input {
      width: 100%; background: #1a1a1a; border: 1px solid #262626;
      color: #d4d4d4; border-radius: 7px; padding: 8px 10px;
      font-size: 12px; font-family: inherit; margin-bottom: 10px;
    }
    #login-view input:focus { outline: none; border-color: #525252; }
    #login-view .error { font-size: 11px; color: #ef4444; margin-bottom: 8px; }

    /* Main view */
    .status-card {
      background: #111; border: 1px solid #1f1f1f; border-radius: 8px;
      padding: 12px; margin-bottom: 12px;
    }
    .status-label { font-size: 10px; color: #525252; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .status-value { font-size: 12px; color: #d4d4d4; }

    .btn {
      width: 100%; padding: 9px; border: none; border-radius: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity 0.15s; margin-bottom: 8px;
      font-family: inherit;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #fff; color: #0a0a0a; }
    .btn-secondary { background: #1a1a1a; color: #a3a3a3; border: 1px solid #262626; }
    .btn-danger { background: transparent; color: #525252; border: 1px solid #262626; font-weight: 400; }

    .settings-section {
      border-top: 1px solid #1f1f1f; padding-top: 12px; margin-top: 4px;
    }
    .settings-section .label {
      font-size: 10px; color: #525252; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 6px;
    }
    .settings-section input {
      width: 100%; background: #1a1a1a; border: 1px solid #262626;
      color: #737373; border-radius: 6px; padding: 6px 8px;
      font-size: 11px; font-family: inherit; margin-bottom: 6px;
    }
    .settings-section input:focus { outline: none; border-color: #525252; color: #d4d4d4; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
        <path d="M7 1L13 4V10L7 13L1 10V4L7 1Z" fill="#0a0a0a"/>
      </svg>
    </div>
    <span class="title">Jarvis</span>
    <span class="subtitle">Reelin AI</span>
  </div>

  <!-- Login view -->
  <div id="login-view" class="body" style="display:none">
    <div class="label" style="margin-bottom: 4px;">Backend URL <span style="color:#ef4444">*</span></div>
    <input type="text" id="api-base-input" placeholder="jarvis-production-42ed.up.railway.app" style="margin-bottom:12px;" />
    <div class="label">Password</div>
    <input type="password" id="password-input" placeholder="Enter your Jarvis password" />
    <div id="login-error" class="error" style="display:none;white-space:pre-line;line-height:1.5;"></div>
    <button class="btn btn-primary" id="login-btn">Sign in</button>
  </div>

  <!-- Main view -->
  <div id="main-view" class="body" style="display:none">
    <div class="status-card">
      <div class="status-label">Active profile</div>
      <div class="status-value" id="profile-name">Reelin AI — Abel Adugam</div>
    </div>

    <button class="btn btn-primary" id="open-sidebar-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      Open Jarvis Sidebar
    </button>

    <button class="btn btn-secondary" id="scan-fill-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      Scan &amp; Auto-Fill
    </button>

    <div class="settings-section">
      <div class="label">Backend</div>
      <input type="text" id="api-base-display" placeholder="https://..." />
      <button class="btn btn-secondary" id="update-api-btn" style="margin-bottom: 8px;">Update</button>
      <button class="btn btn-danger" id="logout-btn">Sign out</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
